<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Horario</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --accent: #c8f043;
    --accent2: #4ff0b5;
    --danger: #ff5a5a;
    --text: #f0f0f0;
    --muted: #6b6b7a;
    --over: #4ff0b5;
    --under: #ff5a5a;
    --exact: #c8f043;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container { max-width: 820px; margin: 0 auto; }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 3rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .logo-block h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
  }

  .logo-block h1 span { color: var(--accent); }

  .logo-block p {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .jornada-config {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
  }

  .jornada-config label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .jornada-config input {
    width: 52px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    padding: 4px 8px;
    text-align: center;
    outline: none;
  }

  .jornada-config input:focus { border-color: var(--accent); }
  .jornada-config span { color: var(--muted); font-size: 0.9rem; }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .drop-zone:hover, .drop-zone.dragging {
    border-color: var(--accent);
    background: rgba(200, 240, 67, 0.03);
  }

  .drop-zone input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
  }

  .drop-icon svg { width: 26px; height: 26px; }

  .drop-zone h2 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .drop-zone p {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .progress-wrap {
    display: none;
    margin-top: 1.5rem;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .progress-bar-bg {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
  }

  .error-box {
    display: none;
    margin-top: 1rem;
    background: rgba(255,90,90,0.08);
    border: 1px solid rgba(255,90,90,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--danger);
  }

  #results { display: none; margin-top: 2.5rem; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 2rem;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .stat-val {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .stat-val.positive { color: var(--over); }
  .stat-val.negative { color: var(--under); }
  .stat-val.neutral { color: var(--accent); }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .t-header {
    display: grid;
    grid-template-columns: 1.8fr 1fr 1fr 1.1fr 1.4fr;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    gap: 8px;
  }

  .t-row {
    display: grid;
    grid-template-columns: 1.8fr 1fr 1fr 1.1fr 1.4fr;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
  }

  .t-row:last-child { border-bottom: none; }
  .t-row:hover { background: var(--surface2); }

  .t-day {
    font-weight: 700;
    font-size: 0.88rem;
    line-height: 1.3;
  }

  .t-day-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    font-weight: 400;
  }

  .t-time {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    color: var(--text);
  }

  .t-worked {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
  }

  .t-diff {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pill {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .pill-over { background: rgba(79,240,181,0.12); color: var(--over); border: 1px solid rgba(79,240,181,0.25); }
  .pill-under { background: rgba(255,90,90,0.1); color: var(--under); border: 1px solid rgba(255,90,90,0.2); }
  .pill-exact { background: rgba(200,240,67,0.1); color: var(--exact); border: 1px solid rgba(200,240,67,0.2); }
  .pill-open { background: rgba(107,107,122,0.15); color: var(--muted); border: 1px solid rgba(107,107,122,0.2); }

  .bar-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    max-width: 100%;
  }

  .debug-toggle {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    margin-top: 1.5rem;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    padding: 0;
  }

  .debug-toggle:hover { color: var(--text); }

  #debug-box {
    display: none;
    margin-top: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 200px;
    overflow-y: auto;
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .t-header, .t-row { grid-template-columns: 1.4fr 0.8fr 0.8fr 1fr; }
    .t-header span:nth-child(5), .t-row .t-diff { display: none; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-block">
      <h1>Registro<span>.</span></h1>
      <p>Calculadora de jornada laboral</p>
    </div>
    <div class="jornada-config">
      <label>Jornada</label>
      <input type="number" id="jornada-h" value="7" min="1" max="12">
      <span>h</span>
      <input type="number" id="jornada-m" value="15" min="0" max="59">
      <span>min</span>
    </div>
  </header>

  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept="image/*">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:#c8f043">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M3 9h18M9 21V9"/>
        <circle cx="16" cy="16" r="2.5"/>
        <path d="M16 13.5V16h2.5"/>
      </svg>
    </div>
    <h2>Sube la captura del registro</h2>
    <p>PNG · JPG · arrastra, haz clic o pega con Ctrl+V</p>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">Iniciando OCR…</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
  </div>

  <div class="error-box" id="error-box"></div>

  <div id="results">
    <div class="summary-grid">
      <div class="stat"><div class="stat-label">Días</div><div class="stat-val neutral" id="s-dias">—</div></div>
      <div class="stat"><div class="stat-label">Total</div><div class="stat-val neutral" id="s-total">—</div></div>
      <div class="stat"><div class="stat-label">Diferencia</div><div class="stat-val" id="s-diff">—</div></div>
      <div class="stat"><div class="stat-label">Media/día</div><div class="stat-val neutral" id="s-media">—</div></div>
    </div>

    <div class="table-wrap">
      <div class="t-header">
        <span>Día</span><span>Entrada</span><span>Salida</span><span>Trabajado</span><span>Diferencia</span>
      </div>
      <div id="table-body"></div>
    </div>

    <button class="debug-toggle" id="debug-toggle" onclick="toggleDebug()">▸ Ver texto OCR</button>
    <div id="debug-box"></div>
  </div>

</div>

<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const progressWrap = document.getElementById('progress-wrap');
const progressBar = document.getElementById('progress-bar');
const progressText = document.getElementById('progress-text');
const progressPct = document.getElementById('progress-pct');
const errorBox = document.getElementById('error-box');
const results = document.getElementById('results');
const tableBody = document.getElementById('table-body');
const debugBox = document.getElementById('debug-box');

let lastOCRText = '';

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragging');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) processFile(fileInput.files[0]); });

document.addEventListener('paste', e => {
  const items = (e.clipboardData || e.originalEvent.clipboardData).items;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) { flashDrop(); processFile(file); }
      break;
    }
  }
});

function flashDrop() {
  dropZone.classList.add('dragging');
  setTimeout(() => dropZone.classList.remove('dragging'), 600);
}

function toggleDebug() {
  const btn = document.getElementById('debug-toggle');
  if (debugBox.style.display === 'block') {
    debugBox.style.display = 'none';
    btn.textContent = '▸ Ver texto OCR';
  } else {
    debugBox.style.display = 'block';
    btn.textContent = '▾ Ocultar texto OCR';
    debugBox.textContent = lastOCRText || '(sin datos)';
  }
}

function getJornada() {
  const h = Math.max(1, parseInt(document.getElementById('jornada-h').value) || 7);
  const m = Math.max(0, parseInt(document.getElementById('jornada-m').value) || 15);
  return h * 60 + m;
}

function fmtMins(total) {
  const sign = total < 0 ? '-' : '';
  const abs = Math.abs(Math.round(total));
  return sign + Math.floor(abs / 60) + 'h ' + String(abs % 60).padStart(2, '0') + 'min';
}

function toMins(hhmm) {
  if (!hhmm) return null;
  const m = hhmm.match(/(\d{1,2})[:\.\-](\d{2})/);
  if (!m) return null;
  return parseInt(m[1]) * 60 + parseInt(m[2]);
}

async function processFile(file) {
  errorBox.style.display = 'none';
  results.style.display = 'none';
  progressWrap.style.display = 'block';
  progressBar.style.width = '0%';
  progressText.textContent = 'Cargando motor OCR…';
  progressPct.textContent = '0%';

  try {
    const { data: { text } } = await Tesseract.recognize(file, 'spa', {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = Math.round(m.progress * 100);
          progressBar.style.width = pct + '%';
          progressPct.textContent = pct + '%';
          progressText.textContent = 'Reconociendo texto…';
        } else if (m.status === 'loading tesseract core') {
          progressText.textContent = 'Cargando motor OCR…';
        } else if (m.status === 'initializing tesseract') {
          progressText.textContent = 'Iniciando…';
        } else if (m.status === 'loading language traineddata') {
          progressText.textContent = 'Cargando idioma…';
        }
      }
    });

    progressText.textContent = 'Procesando datos…';
    lastOCRText = text;
    debugBox.style.display = 'none';
    document.getElementById('debug-toggle').textContent = '▸ Ver texto OCR';

    const dias = parseOCR(text);

    if (dias.length === 0) {
      throw new Error('No se detectaron registros horarios. Asegúrate de subir una imagen clara con formato HH:MM visible.');
    }

    progressWrap.style.display = 'none';
    renderResults(dias);

  } catch (e) {
    progressWrap.style.display = 'none';
    errorBox.textContent = '⚠ ' + (e.message || 'Error al procesar la imagen.');
    errorBox.style.display = 'block';
  }
}

function parseOCR(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const dias = [];
  let current = null;

  const DAY_NAMES = ['lunes','martes','miércoles','miercoles','jueves','viernes','sábado','sabado','domingo'];
  const TIME_RE = /\b(\d{1,2})[:\.\-](\d{2})\b/g;
  const DATE_RE = /(\d{1,2})[\/\-](\d{2})[\/\-](\d{4})/;

  for (const line of lines) {
    const low = line.toLowerCase();

    // Detecta línea de cabecera de día
    const isDayLine = DAY_NAMES.some(d => low.includes(d));
    const dateMatch = line.match(DATE_RE);

    if (isDayLine || (dateMatch && !current)) {
      if (current) dias.push(current);
      let dayName = '';
      for (const d of DAY_NAMES) {
        if (low.includes(d)) { dayName = d.charAt(0).toUpperCase() + d.slice(1); break; }
      }
      const fecha = dateMatch ? dateMatch[0] : '';
      current = { dia: dayName, fecha, tipo: 'Oficina', entrada: null, salida: null };
      continue;
    }

    if (!current) continue;

    // Detecta tipo
    if (low.includes('teletrabajo') || low.includes('telework') || low.includes('remoto')) current.tipo = 'Teletrabajo';
    else if (low.includes('oficina') || low.includes('office')) current.tipo = 'Oficina';

    // Extrae horas de la línea
    const times = [];
    let tm;
    TIME_RE.lastIndex = 0;
    while ((tm = TIME_RE.exec(line)) !== null) {
      const h = parseInt(tm[1]), m = parseInt(tm[2]);
      if (h >= 0 && h <= 23 && m >= 0 && m <= 59) times.push(tm[0].replace('.', ':').replace('-', ':'));
    }

    if (times.length >= 2) {
      current.entrada = times[0];
      current.salida = times[1];
    } else if (times.length === 1) {
      if (!current.entrada) current.entrada = times[0];
      else if (!current.salida) current.salida = times[0];
    }
  }

  if (current) dias.push(current);

  // Filtrar entradas sin al menos entrada
  return dias.filter(d => d.entrada);
}

function renderResults(dias) {
  const jornada = getJornada();
  tableBody.innerHTML = '';

  let totalMin = 0, diffAcum = 0, diasCompletos = 0;
  const maxDiff = Math.max(...dias.map(d => {
    const e = toMins(d.entrada), s = toMins(d.salida);
    return (e !== null && s !== null) ? Math.abs((s - e) - jornada) : 0;
  }), 1);

  dias.forEach(d => {
    const entMin = toMins(d.entrada);
    const salMin = d.salida ? toMins(d.salida) : null;
    const worked = (entMin !== null && salMin !== null) ? salMin - entMin : null;
    const diff = worked !== null ? worked - jornada : null;

    if (worked !== null) { totalMin += worked; diffAcum += diff; diasCompletos++; }

    const row = document.createElement('div');
    row.className = 't-row';

    let pill = '';
    let barColor = '';
    let barWidth = 0;

    if (diff === null) {
      pill = '<span class="pill pill-open">En curso</span>';
    } else {
      const absDiff = Math.abs(diff);
      barWidth = Math.min(100, Math.round((absDiff / maxDiff) * 100));
      if (absDiff <= 3) {
        pill = '<span class="pill pill-exact">Exacto</span>';
        barColor = '#c8f043';
      } else if (diff > 0) {
        pill = `<span class="pill pill-over">+${diff} min</span>`;
        barColor = '#4ff0b5';
      } else {
        pill = `<span class="pill pill-under">${diff} min</span>`;
        barColor = '#ff5a5a';
      }
    }

    row.innerHTML = `
      <div>
        <div class="t-day">${d.dia}</div>
        <div class="t-day-sub">${d.fecha} · ${d.tipo}</div>
      </div>
      <div class="t-time">${d.entrada || '—'}</div>
      <div class="t-time">${d.salida || '—'}</div>
      <div class="t-worked">${worked !== null ? fmtMins(worked) : '—'}</div>
      <div class="t-diff">
        ${pill}
        ${diff !== null && Math.abs(diff) > 3 ? `<div class="bar-track"><div class="bar-fill" style="width:${barWidth}%;background:${barColor}"></div></div>` : ''}
      </div>
    `;
    tableBody.appendChild(row);
  });

  document.getElementById('s-dias').textContent = diasCompletos;
  document.getElementById('s-total').textContent = diasCompletos ? fmtMins(totalMin) : '—';

  const diffEl = document.getElementById('s-diff');
  if (diasCompletos) {
    const sign = diffAcum >= 0 ? '+' : '';
    diffEl.textContent = sign + diffAcum + ' min';
    diffEl.className = 'stat-val ' + (diffAcum > 0 ? 'positive' : diffAcum < 0 ? 'negative' : 'neutral');
  } else {
    diffEl.textContent = '—';
    diffEl.className = 'stat-val neutral';
  }

  document.getElementById('s-media').textContent = diasCompletos ? fmtMins(totalMin / diasCompletos) : '—';
  results.style.display = 'block';
}
</script>
</body>
</html>
