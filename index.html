<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Horario</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e0e10; --surface: #18181c; --surface2: #222228; --border: #2e2e38;
  --accent: #c8f043; --accent2: #4ff0b5; --danger: #ff5a5a;
  --text: #f0f0f0; --muted: #6b6b7a;
  --over: #4ff0b5; --under: #ff5a5a; --exact: #c8f043;
}
body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
.container { max-width: 900px; margin: 0 auto; }

header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 3rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap; }
.logo-block h1 { font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
.logo-block h1 span { color: var(--accent); }
.logo-block p { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 6px; letter-spacing: 0.08em; text-transform: uppercase; }

.config { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; flex-wrap: wrap; }
.config label { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
.config input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--accent); font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 500;
  padding: 4px 8px; text-align: center; outline: none; width: 52px;
  -moz-appearance: textfield;
}
.config input#tramo { width: 44px; }
.config input::-webkit-outer-spin-button,
.config input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.config input:focus { border-color: var(--accent); }
.config span { color: var(--muted); font-size: 0.9rem; }
.config .sep { width: 1px; height: 20px; background: var(--border); margin: 0 8px; }

.drop-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 3rem 2rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; overflow: hidden; }
.drop-zone:hover, .drop-zone.dragging { border-color: var(--accent); background: rgba(200,240,67,0.03); }
.drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.drop-icon { width: 56px; height: 56px; border-radius: 14px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
.drop-icon svg { width: 26px; height: 26px; }
.drop-zone h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
.drop-zone p { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

.progress-wrap { display: none; margin-top: 1.5rem; }
.progress-label { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; display: flex; justify-content: space-between; }
.progress-bar-bg { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.3s; }

.error-box { display: none; margin-top: 1rem; background: rgba(255,90,90,0.08); border: 1px solid rgba(255,90,90,0.3); border-radius: 10px; padding: 12px 16px; font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--danger); }

#results { display: none; margin-top: 2.5rem; }
.summary-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 2rem; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
.stat-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
.stat-val { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
.stat-val.positive { color: var(--over); }
.stat-val.negative { color: var(--under); }
.stat-val.neutral { color: var(--accent); }

.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.t-header { display: grid; grid-template-columns: 1.8fr 1fr 1fr 1.1fr 1.3fr 1.2fr; padding: 12px 20px; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); gap: 8px; }
.t-row { display: grid; grid-template-columns: 1.8fr 1fr 1fr 1.1fr 1.3fr 1.2fr; padding: 14px 20px; border-bottom: 1px solid var(--border); align-items: center; gap: 8px; transition: background 0.15s; }
.t-row:last-child { border-bottom: none; }
.t-row:hover { background: var(--surface2); }
.t-day { font-weight: 700; font-size: 0.88rem; line-height: 1.3; }
.t-day-sub { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); font-weight: 400; }
.t-time { font-family: 'DM Mono', monospace; font-size: 0.9rem; }
.t-worked { font-family: 'DM Mono', monospace; font-size: 0.9rem; font-weight: 500; }
.t-diff { display: flex; align-items: center; gap: 8px; }

.pill { font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 500; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
.pill-over  { background: rgba(79,240,181,0.12); color: var(--over);  border: 1px solid rgba(79,240,181,0.25); }
.pill-under { background: rgba(255,90,90,0.1);   color: var(--under); border: 1px solid rgba(255,90,90,0.2); }
.pill-exact { background: rgba(200,240,67,0.1);  color: var(--exact); border: 1px solid rgba(200,240,67,0.2); }
.pill-open  { background: rgba(107,107,122,0.15);color: var(--muted); border: 1px solid rgba(107,107,122,0.2); }
.pill-bolsa { padding: 4px 14px; }

.bar-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.bar-fill  { height: 100%; border-radius: 2px; max-width: 100%; }

.debug-toggle { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; cursor: pointer; margin-top: 1.5rem; display: inline-flex; align-items: center; gap: 6px; background: none; border: none; padding: 0; }
.debug-toggle:hover { color: var(--text); }
#debug-box { display: none; margin-top: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); white-space: pre-wrap; word-break: break-word; max-height: 200px; overflow-y: auto; line-height: 1.6; }

@media (max-width: 600px) {
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  .t-header, .t-row { grid-template-columns: 1.4fr 0.8fr 0.8fr 1fr 1fr; }
  .t-header span:nth-child(6), .t-row > div:nth-child(6) { display: none; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-block">
      <h1>Registro<span>.</span></h1>
      <p>Calculadora de jornada laboral</p>
    </div>
    <div class="config">
      <label>Jornada</label>
      <input type="number" id="jornada-h" value="7" min="1" max="12">
      <span>h</span>
      <input type="number" id="jornada-m" value="15" min="0" max="59">
      <span>min</span>
      <div class="sep"></div>
      <label>Tramo bolsa</label>
      <input type="number" id="tramo" value="15" min="1" max="60">
      <span>min</span>
    </div>
  </header>

  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <input type="file" id="file-input" accept="image/*">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c8f043" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M3 9h18M9 21V9"/>
      </svg>
    </div>
    <h2>Sube la captura del registro</h2>
    <p>PNG · JPG · arrastra, haz clic o pega con Ctrl+V</p>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">Iniciando OCR…</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
  </div>

  <div class="error-box" id="error-box"></div>

  <div id="results">
    <div class="summary-grid">
      <div class="stat"><div class="stat-label">Días</div><div class="stat-val neutral" id="s-dias">—</div></div>
      <div class="stat"><div class="stat-label">Total</div><div class="stat-val neutral" id="s-total">—</div></div>
      <div class="stat"><div class="stat-label">Bolsa acum.</div><div class="stat-val" id="s-diff">—</div></div>
      <div class="stat"><div class="stat-label">Media/día</div><div class="stat-val neutral" id="s-media">—</div></div>
    </div>
    <div class="table-wrap">
      <div class="t-header">
        <span>Día</span><span>Entrada</span><span>Salida</span><span>Trabajado</span><span>Diferencia</span><span>Bolsa</span>
      </div>
      <div id="table-body"></div>
    </div>
    <button class="debug-toggle" id="debug-toggle" onclick="toggleDebug()">▸ Ver texto OCR</button>
    <div id="debug-box"></div>
  </div>
</div>

<script>
// ── DOM refs ──────────────────────────────────────────────────────────────────
const dropZone     = document.getElementById('drop-zone');
const fileInput    = document.getElementById('file-input');
const progressWrap = document.getElementById('progress-wrap');
const progressBar  = document.getElementById('progress-bar');
const progressText = document.getElementById('progress-text');
const progressPct  = document.getElementById('progress-pct');
const errorBox     = document.getElementById('error-box');
const resultsEl    = document.getElementById('results');
const tableBody    = document.getElementById('table-body');
const debugBox     = document.getElementById('debug-box');
let lastOCRText    = '';

// ── Events ────────────────────────────────────────────────────────────────────
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragging');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) processFile(fileInput.files[0]); });
document.addEventListener('paste', e => {
  for (const item of (e.clipboardData || e.originalEvent.clipboardData).items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) { dropZone.classList.add('dragging'); setTimeout(() => dropZone.classList.remove('dragging'), 600); processFile(file); }
      break;
    }
  }
});

// ── Config helpers ────────────────────────────────────────────────────────────
function getJornada() {
  const h = Math.max(1, parseInt(document.getElementById('jornada-h').value) || 7);
  const m = Math.max(0, parseInt(document.getElementById('jornada-m').value) || 15);
  return h * 60 + m;
}
function getTramo() {
  return Math.max(1, parseInt(document.getElementById('tramo').value) || 15);
}

// ── Time utils ────────────────────────────────────────────────────────────────
function toMins(hhmm) {
  if (!hhmm) return null;
  const m = hhmm.match(/(\d{1,2}):(\d{2})/);
  return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : null;
}
function fmtMins(total) {
  const sign = total < 0 ? '-' : '';
  const abs  = Math.abs(Math.round(total));
  return sign + Math.floor(abs / 60) + 'h ' + String(abs % 60).padStart(2, '0') + 'min';
}

// Positivo → floor (pierdes el resto), Negativo → ceil en negativo (pagas tramo completo)
function roundBolsa(diff, tramo) {
  if (diff === null) return null;
  if (diff >= 0) return Math.floor(diff / tramo) * tramo;
  return -Math.ceil(Math.abs(diff) / tramo) * tramo;
}

// ── OCR ───────────────────────────────────────────────────────────────────────
async function processFile(file) {
  errorBox.style.display = 'none';
  resultsEl.style.display = 'none';
  progressWrap.style.display = 'block';
  progressBar.style.width = '0%';
  progressText.textContent = 'Cargando motor OCR…';
  progressPct.textContent = '0%';
  try {
    const { data: { text } } = await Tesseract.recognize(file, 'spa', {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = Math.round(m.progress * 100);
          progressBar.style.width = pct + '%';
          progressPct.textContent = pct + '%';
          progressText.textContent = 'Reconociendo texto…';
        } else {
          const labels = { 'loading tesseract core': 'Cargando motor OCR…', 'initializing tesseract': 'Iniciando…', 'loading language traineddata': 'Cargando idioma…' };
          if (labels[m.status]) progressText.textContent = labels[m.status];
        }
      }
    });
    progressText.textContent = 'Procesando datos…';
    lastOCRText = text;
    debugBox.style.display = 'none';
    document.getElementById('debug-toggle').textContent = '▸ Ver texto OCR';
    const dias = parseOCR(text);
    if (!dias.length) throw new Error('No se detectaron registros horarios. Asegúrate de que la imagen sea clara y las horas estén visibles.');
    progressWrap.style.display = 'none';
    renderResults(dias);
  } catch(e) {
    progressWrap.style.display = 'none';
    errorBox.textContent = '⚠ ' + (e.message || 'Error al procesar la imagen.');
    errorBox.style.display = 'block';
  }
}

// ── Parser ────────────────────────────────────────────────────────────────────
function extractTimes(seg) {
  // Extrae todas las horas con formato HH:MM o HH.MM o HHMM (4 dígitos)
  // Solo acepta horas laborables: 06:00 – 22:00
  // Excluye números que parezcan años (>= 2000) o fechas (DD/MM/YYYY ya eliminadas del segmento)
  const RE = /\b(\d{1,2})[:\.](\d{2})\b|\b([01]\d|2[0-1])([0-5]\d)\b/g;
  const times = [];
  let m;
  while ((m = RE.exec(seg)) !== null) {
    let h, min;
    if (m[1] !== undefined) { h = parseInt(m[1]); min = parseInt(m[2]); }
    else                    { h = parseInt(m[3]); min = parseInt(m[4]); }
    if (h >= 6 && h <= 21 && min >= 0 && min <= 59) {
      times.push({ val: h * 60 + min, str: String(h).padStart(2,'0') + ':' + String(min).padStart(2,'0') });
    }
  }
  return times;
}

function parseOCR(text) {
  const DAY_MAP = {
    'lunes':'Lunes', 'martes':'Martes', 'miercoles':'Miércoles', 'miércoles':'Miércoles',
    'jueves':'Jueves', 'viernes':'Viernes', 'sabado':'Sábado', 'sábado':'Sábado', 'domingo':'Domingo'
  };
  const DATE_RE = /(\d{1,2})[\/\-\.](\d{2})[\/\-\.](\d{4})/g;

  // Aplanar eliminando saltos de línea
  const flat = text.replace(/\r?\n/g, ' ').replace(/\s{2,}/g, ' ');

  // Localizar posición de cada día en el texto
  const positions = [];
  for (const [key, val] of Object.entries(DAY_MAP)) {
    const re = new RegExp('\\b' + key + '\\b', 'gi');
    let m;
    while ((m = re.exec(flat)) !== null) {
      if (!positions.find(p => Math.abs(p.index - m.index) < 3)) {
        positions.push({ index: m.index, name: val });
      }
    }
  }
  positions.sort((a, b) => a.index - b.index);

  const dias = [];
  for (let i = 0; i < positions.length; i++) {
    const start = positions[i].index;
    const end   = positions[i + 1] ? positions[i + 1].index : flat.length;
    let   seg   = flat.slice(start, end);

    // Eliminar fechas del segmento para que sus números no sean confundidos con horas
    seg = seg.replace(DATE_RE, '');

    const segLow = seg.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const dateMatch = flat.slice(start, end).match(/(\d{1,2})[\/\-\.](\d{2})[\/\-\.](\d{4})/);
    const fecha = dateMatch ? dateMatch[0] : '';

    let tipo = 'Oficina';
    if (segLow.includes('teletrabajo') || segLow.includes('telework') || segLow.includes('remoto')) tipo = 'Teletrabajo';

    const times = extractTimes(seg);

    // De todas las horas encontradas, elegir el par más coherente:
    // entrada = la primera hora válida, salida = la siguiente que sea > entrada y diferencia <= 12h
    let entrada = null;
    let salida  = null;
    if (times.length >= 1) {
      entrada = times[0];
      for (let j = 1; j < times.length; j++) {
        const diff = times[j].val - entrada.val;
        if (diff > 0 && diff <= 720) { // salida > entrada y máximo 12h de diferencia
          salida = times[j];
          break;
        }
      }
    }

    dias.push({
      dia:    positions[i].name,
      fecha,
      tipo,
      entrada: entrada ? entrada.str : null,
      salida:  salida  ? salida.str  : null
    });
  }

  return dias.filter(d => d.entrada);
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderResults(dias) {
  const jornada = getJornada();
  const tramo   = getTramo();
  tableBody.innerHTML = '';

  let totalMin = 0, bolsaAcum = 0, diasCompletos = 0;

  // Calcular maxDiff para escalar las barras
  const diffs = dias.map(d => {
    const e = toMins(d.entrada), s = toMins(d.salida);
    return (e !== null && s !== null) ? Math.abs((s - e) - jornada) : 0;
  });
  const maxDiff = Math.max(...diffs, 1);

  dias.forEach(d => {
    const entMin  = toMins(d.entrada);
    const salMin  = toMins(d.salida);
    const worked  = (entMin !== null && salMin !== null) ? salMin - entMin : null;
    const diff    = worked !== null ? worked - jornada : null;
    const bolsa   = roundBolsa(diff, tramo);

    if (worked !== null) {
      totalMin   += worked;
      bolsaAcum  += bolsa;
      diasCompletos++;
    }

    // Pill diferencia (minutos reales)
    let pill     = '';
    let barColor = '';
    let barWidth = 0;
    if (diff === null) {
      pill = '<span class="pill pill-open">En curso</span>';
    } else {
      barWidth = Math.min(100, Math.round((Math.abs(diff) / maxDiff) * 100));
      if (Math.abs(diff) <= 3) {
        pill = '<span class="pill pill-exact">0 min</span>';
        barColor = '#c8f043';
      } else if (diff > 0) {
        pill = `<span class="pill pill-over">+${diff} min</span>`;
        barColor = '#4ff0b5';
      } else {
        pill = `<span class="pill pill-under">${diff} min</span>`;
        barColor = '#ff5a5a';
      }
    }

    // Pill bolsa (redondeada al tramo)
    let bolsaPill = '<span class="pill pill-open">—</span>';
    if (bolsa !== null) {
      const sign = bolsa >= 0 ? '+' : '';
      if (bolsa === 0)      bolsaPill = '<span class="pill pill-exact pill-bolsa">0 min</span>';
      else if (bolsa > 0)   bolsaPill = `<span class="pill pill-over pill-bolsa">${sign}${bolsa} min</span>`;
      else                  bolsaPill = `<span class="pill pill-under pill-bolsa">${bolsa} min</span>`;
    }

    const row = document.createElement('div');
    row.className = 't-row';
    row.innerHTML = `
      <div>
        <div class="t-day">${d.dia}</div>
        <div class="t-day-sub">${d.fecha} · ${d.tipo}</div>
      </div>
      <div class="t-time">${d.entrada || '—'}</div>
      <div class="t-time">${d.salida  || '—'}</div>
      <div class="t-worked">${worked !== null ? fmtMins(worked) : '—'}</div>
      <div class="t-diff">
        ${pill}
        ${diff !== null && Math.abs(diff) > 3
          ? `<div class="bar-track"><div class="bar-fill" style="width:${barWidth}%;background:${barColor}"></div></div>`
          : ''}
      </div>
      <div style="display:flex;align-items:center;">${bolsaPill}</div>
    `;
    tableBody.appendChild(row);
  });

  document.getElementById('s-dias').textContent  = diasCompletos;
  document.getElementById('s-total').textContent = diasCompletos ? fmtMins(totalMin) : '—';
  document.getElementById('s-media').textContent = diasCompletos ? fmtMins(totalMin / diasCompletos) : '—';

  const diffEl = document.getElementById('s-diff');
  if (diasCompletos) {
    const sign = bolsaAcum >= 0 ? '+' : '';
    diffEl.textContent  = sign + bolsaAcum + ' min';
    diffEl.className    = 'stat-val ' + (bolsaAcum > 0 ? 'positive' : bolsaAcum < 0 ? 'negative' : 'neutral');
  } else {
    diffEl.textContent = '—';
    diffEl.className   = 'stat-val neutral';
  }

  resultsEl.style.display = 'block';
}

// ── Debug ─────────────────────────────────────────────────────────────────────
function toggleDebug() {
  const btn = document.getElementById('debug-toggle');
  if (debugBox.style.display === 'block') {
    debugBox.style.display = 'none';
    btn.textContent = '▸ Ver texto OCR';
  } else {
    debugBox.style.display = 'block';
    btn.textContent = '▾ Ocultar texto OCR';
    debugBox.textContent = lastOCRText || '(sin datos)';
  }
}
</script>
</body>
</html>
